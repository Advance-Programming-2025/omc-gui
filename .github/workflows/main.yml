name: Cargo Build & Test

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env: 
  CARGO_TERM_COLOR: always
  binary: omc-gui

jobs:
  build_and_test:
    name: omc-gui - latest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install wayland dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libx11-dev libasound2-dev libudev-dev libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev libwayland-dev

      - name: Build package
        run: | 
          cargo build --release --target x86_64-unknown-linux-gnu

      - name: Prepare package
        run: |
          mkdir linux
          cp target/x86_64-unknown-linux-gnu/release/${{ env.binary }} linux/
          cp -r assets linux/ || true

      - name: Create tarball
        run: |
          tar -czf ${{ env.binary }}.tar.gz -C linux .

      - name: Upload binaries to artifacts
        uses: actions/upload-artifact@v4
        with:
          path: ${{ env.binary }}.tar.gz
          name: linux
          retention-days: 1

      - name: Upload binary to releases
        uses: svenstaro/upload-release-action@v2
        with: 
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: ${{ env.binary }}.tar.gz
          asset_name:  ${{ env.binary }}-linux.tar.gz
          tag: ${{ github.ref }}
          overwrite: true
          body: "Latest release of the OMC galaxy visualizer"

  release-windows:
      runs-on: windows-latest
  
      steps:
        - uses: actions/checkout@v6

        - name: Install Rust for Windows
          uses: dtolnay/rust-toolchain@stable
          with:
            targets: x86_64-pc-windows-msvc
  
        - name: Build
          run: |
            cargo build --release --target x86_64-pc-windows-msvc
  
        - name: Prepare package
          run: |
            mkdir windows
            cp target/x86_64-pc-windows-msvc/release/${{ env.binary }}.exe windows/
            mkdir assets -ea 0
            cp -r assets windows/
  
        - name: Package as a zip
          run: |
            Compress-Archive -Path windows/* -DestinationPath ${{ env.binary }}.zip
  
        - name: Upload binaries to artifacts
          uses: actions/upload-artifact@v4
          with:
            path: ${{ env.binary }}.zip
            name: windows
            retention-days: 1
  
        - name: Upload binaries to release
          uses: svenstaro/upload-release-action@v2
          with:
            repo_token: ${{ secrets.GITHUB_TOKEN }}
            file: ${{ env.binary }}.zip
            asset_name: ${{ env.binary }}-windows.zip
            tag: ${{ github.ref }}
            overwrite: true

  release-macOS-apple-silicon:
    runs-on: macOS-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust for MacOS
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin
      - name: Environment 
        # macOS 11 was the first version to support ARM
        run: |
          export MACOSX_DEPLOYMENT_TARGET="11"

      - name: Build
        run: |
          cargo build --release --target aarch64-apple-darwin

      - name: Prepare Package
        run: |
          mkdir -p ${{ env.binary }}.app/Contents/MacOS
          cp target/aarch64-apple-darwin/release/${{ env.binary }} ${{ env.binary }}.app/Contents/MacOS/
          cp -r assets ${{ env.binary }}.app/Contents/MacOS/ || true
          hdiutil create -fs HFS+ -volname "${{ env.binary }}-macOS-apple-silicon" -srcfolder ${{ env.binary }}.app ${{ env.binary }}-macOS-apple-silicon.dmg

      - name: Upload binaries to artifacts
        uses: actions/upload-artifact@v4
        with:
          path: ${{ env.binary }}-macOS-apple-silicon.dmg
          name: macOS-apple-silicon
          retention-days: 1

      - name: Upload binaries to release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: ${{ env.binary }}-macOS-apple-silicon.dmg
          asset_name: ${{ env.binary }}-macOS-apple-silicon.dmg
          tag: ${{ github.ref }}
          overwrite: true

